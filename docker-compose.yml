services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: journey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: photo_journey
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journey -d photo_journey"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  # ── Database migrations ─────────────────────────────────────────────────────
  # Chạy `prisma migrate deploy` một lần rồi thoát.
  # App chỉ start sau khi migrate thành công.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://journey:${POSTGRES_PASSWORD:-changeme}@db:5432/photo_journey?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://journey:${POSTGRES_PASSWORD:-changeme}@db:5432/photo_journey?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      NODE_ENV: production
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
  uploads_data:
